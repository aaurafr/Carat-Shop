<!DOCTYPE html>
<html lang="en">

<body>
    <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Carat Shop SVT</title>
    <style>
        
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e9d5ff, #f5d0fe, #ddd6fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Box login */
.container {
    background: linear-gradient(135deg, #f5e9ff, #ede9fe, #fce7f3);
    padding: 35px;
    border-radius: 20px;
    width: 340px;
    box-shadow: 0 10px 25px rgba(168,85,247,0.18);
}

h2 {
    text-align: center;
    color: #7c3aed;
    margin-bottom: 20px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 2px solid #ddd6fe;
    border-radius: 10px;
    outline: none;
    transition: 0.3s;
    background: #faf5ff;
}

input:focus {
    border-color: #c084fc;
    box-shadow: 0 0 8px rgba(192,132,252,0.4);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    background: linear-gradient(90deg, #a78bfa, #f0abfc);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(90deg, #8b5cf6, #d946ef);
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
}

.footer a {
    color: #9333ea;
    text-decoration: none;
    font-weight: 500;
}
</style>
</head>
<body>

<div class="container">
    <h2>💎 Login Carat Shop</h2>

    <form action="css index.html">
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Masuk</button>
    </form>

    <div class="footer">
        Belum punya akun? <a href="css register.html">Daftar</a><br>
    </div>
</div>

</body>
</html>
</body>
</html>
