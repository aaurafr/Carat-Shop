<!DOCTYPE html>
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Berhasil - Carat Shop SVT</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fbd3e9, #bbded6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #ff7eb3;
        }

        p {
            margin: 10px 0;
        }

        button {
            margin-top: 15px;
            padding: 10px 15px;
            background: #ff7eb3;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #ff4f9a;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🎉 Pembayaran Berhasil!</h2>
    <p>Terima kasih sudah berbelanja di Carat Shop SVT 💖</p>
    <p>Pesanan kamu sedang diproses.</p>

    <button onclick="window.location.href='css index.html'">Kembali ke halaman utama</button>
</div>

</body>
</html>
